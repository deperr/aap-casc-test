---

eda_rulebook_activations:

  - name: Website Heartbeat Check
    description: Rulebook that checks that one or more URLs is reachable
    organization: Default
    project: "Personal | EDA Demos (CaC)"
    rulebook: url_check.yml
    decision_environment: Default Decision Environment
    eda_credentials:
      - Ansible Automation Platform Controller
    enabled: false
    log_level: debug
    restart_policy: never