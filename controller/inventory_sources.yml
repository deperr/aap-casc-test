---

controller_inventory_sources:

  - name: AWS (Personal Account)
    organization: Default
    source: ec2
    inventory: Home Lab (New)
    credential: AWS (Personal)
    overwrite: true
    source_vars:
      hostnames:
        - tag:Name
      compose:
        ansible_host: public_ip_address
        ansible_user: ec2-user
        ansible_winrm_kerberos_hostname_override: tags.Name + '.ansible.local' if platform_details == 'Windows' else omit
      groups:
        cloud_aws: true
        os_linux: "platform_details == 'Red Hat Enterprise Linux'"
        os_windows: "platform_details == 'Windows'"

      keyed_groups:
        - key: tags.Compliance
          separator: ''

  - name: Red Hat Insights
    organization: Default
    source: insights
    inventory: Home Lab (New)
    credential: Insights
    overwrite: true
    group: os_linux