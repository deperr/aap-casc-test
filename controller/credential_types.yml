---

controller_credential_types:

  - name: Open Policy Agent Server
    description: Credential for Open Policy Agent Server integration
    kind: cloud
    inputs:
      fields:
        - id: opa_server
          label: Server URL
          help_text: http://localhost:8181
          type: string
        - id: opa_token
          label: Token
          secret: true
          type: string
        - id: opa_validate_certs
          label: Validate Certificates
          type: boolean
          default: true
      required:
        - opa_server
        - opa_token
        - opa_validate_certs
    injectors:
      extra_vars:
        opa_server: !unsafe '{{ opa_server }}'
        opa_token: !unsafe '{{ opa_token }}'
        opa_validate_certs: !unsafe '{{ opa_validate_certs }}'

  - name: ServiceNow Credential
    description: Credential for use with servicenow.itsm collection
    kind: cloud
    injectors:
      env:
        SN_CLIENT_ID: !unsafe '{{ snow_client_id }}'
        SN_CLIENT_SECRET: !unsafe '{{ snow_client_secret }}'
        SN_HOST: !unsafe '{{ snow_host }}'
        SN_PASSWORD: !unsafe '{{ snow_password }}'
        SN_USERNAME: !unsafe '{{ snow_user }}'
    inputs:
      fields:
      - id: snow_host
        label: ServiceNow Host
        type: string
      - id: snow_user
        label: ServiceNow User
        type: string
      - id: snow_password
        label: ServiceNow User's Password
        secret: true
        type: string
      - id: snow_client_id
        label: ServiceNow Client Id
        type: string
      - id: snow_client_secret
        label: ServiceNow Client Secret
        secret: true
        type: string
      required:
      - snow_host
      - snow_user
      - snow_password

  - name: Promox User Credential
    description: Default creds for a Proxmox instance
    kind: cloud
    injectors:
      extra_vars:
        proxmox_default_password: !unsafe '{{ pve_user_password }}'
        proxmox_default_user: !unsafe '{{ pve_user }}'
    inputs:
      fields:
      - id: pve_user
        label: PVE Instance User
        type: string
      - id: pve_user_password
        label: PVE Instance User's Password
        secret: true
        type: string
      required:
      - pve_user
      - pve_user_password

  - name: Proxmox VE Credential
    description: Authenticate with a Proxmox VE API
    kind: cloud
    injectors:
      env:
        PROXMOX_HOST: !unsafe '{{ pve_api_host }}'
        PROXMOX_PASSWORD: !unsafe '{{ pve_api_password }}'
        PROXMOX_PORT: !unsafe '{{ pve_api_port }}'
        PROXMOX_USER: !unsafe '{{ pve_api_user }}'
      extra_vars:
        proxmox_api_host: !unsafe '{{ pve_api_host }}'
        proxmox_api_password: !unsafe '{{ pve_api_password }}'
        proxmox_api_token_id: !unsafe '{{ pve_api_token_id }}'
        proxmox_api_token_secret: !unsafe '{{ pve_api_token_secret }}'
        proxmox_api_user: !unsafe '{{ pve_api_user }}'
        pve_api_port: !unsafe '{{ pve_api_port }}'
    inputs:
      fields:
      - id: pve_api_host
        label: Host
        type: string
      - id: pve_api_port
        label: Port
        type: string
      - id: pve_api_user
        label: User
        type: string
      - id: pve_api_token_id
        label: Token Id
        type: string
      - id: pve_api_token_secret
        label: Token Secret
        secret: true
        type: string
      - id: pve_api_password
        label: Password
        secret: true
        type: string
      required:
      - pve_api_host
      - pve_api_user

  - name: Red Hat Subscription Manager
    description: Credential for integration with Red Hat Subscription Manager
    kind: cloud
    injectors:
      extra_vars:
        customer_portal_password: !unsafe '{{ rhsm_password }}'
        customer_portal_username: !unsafe '{{ rhsm_user }}'
        rhsm_password: !unsafe '{{ rhsm_password }}'
        rhsm_user: !unsafe '{{ rhsm_user }}'
    inputs:
      fields:
      - id: rhsm_user
        label: RHSM Username
        type: string
      - id: rhsm_password
        label: RHSM Password
        secret: true
        type: string
      required:
      - rhsm_user
      - rhsm_password
