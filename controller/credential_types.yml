---

controller_credential_types:

- name: Open Policy Agent Server
  description: Open Policy Agent Server integration
  kind: cloud
  inputs:
    fields:
      - id: opa_server
        label: Server URL
        help_text: http://localhost:8181
        type: string
      - id: opa_token
        label: Token
        secret: true
        type: string
      - id: opa_validate_certs
        label: Validate Certificates
        type: boolean
        default: true
    required:
      - opa_server
      - opa_token
      - opa_validate_certs
  injectors:
    extra_vars:
      opa_server: !unsafe '{{ opa_server }}'
      opa_token: !unsafe '{{ opa_token }}'
      opa_validate_certs: !unsafe '{{ opa_validate_certs }}'
