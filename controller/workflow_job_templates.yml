---

controller_workflows:

- name: CASC | Windows | Workflow
  organization: Default
  allow_simultaneous: true
  workflow_nodes:
    
    # Root Node A: Project Sync
    - identifier: Sync Test Repo New
      related:
        success_nodes:
          - identifier: Next Downstream Job
      unified_job_template:
        name: Test Repo New
        organization:
          name: Default
          type: organization
        type: project

    # Root Node B: Inventory Sync
    - identifier: Sync Home Lab Inventory
      related:
        success_nodes:
          - identifier: Next Downstream Job
      unified_job_template:
        name: Home Lab
        organization:
          name: Default
          type: organization
        type: inventory_source

    # Converged Child Node: Waits for both syncs to succeed
    - identifier: Next Downstream Job
      all_parents_must_converge: true
      unified_job_template:
        name: Your Standard Job Template # Replace with your actual job template
        organization:
          name: Default
          type: organization
        type: job_template

