---

controller_workflows:

- name: CASC | Windows | Workflow
  organization: Default
  allow_simultaneous: true
  simplified_workflow_nodes:
    
    # Root Node A: Project Sync
    - identifier: Sync Test Repo New
      related:
        success_nodes:
          - identifier: Next Downstream Job
      unified_job_template:
        name: Test Repo New
        organization:
          name: Default
          type: organization
        type: project

    - identifier: Update Inventory
      # related:
      #   success_nodes: Next Downstream Job
      unified_job_template: Home Lab
      success_nodes:
        - Next Downstream Job
    # Root Node B: Inventory Sync
    # - identifier: Sync Home Lab Inventory
    #   related:
    #     success_nodes:
    #       - identifier: Next Downstream Job
    #   unified_job_template: Home Lab
      # unified_job_template:
      #   inventory:
      #     name: Home Lab # Name of the inventory source
      #     organization:
      #       name: Default
      #       type: organization
      #   name: Home Lab
      #   type: inventory

    # Converged Child Node: Waits for both syncs to succeed
    - identifier: Next Downstream Job
      all_parents_must_converge: true
      unified_job_template:
        name: TEST CASC | Windows | Query Services # Replace with your actual job template
        organization:
          name: Default
          type: organization
        type: job_template

