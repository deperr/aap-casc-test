---

controller_workflows:

- name: CASC | Windows | Workflow
  organization: Default
  labels: ['windows']
  allow_simultaneous: true
  ask_variables_on_launch: false
  workflow_nodes:
    - identifier: Sync Project
      related:
        success_nodes:
          - identifier: Query Services
      unified_job_template:
        name: Test Repo New
        organization:
          name: Default
          type: organization
        type: project
    - identifier: Sync Inventory
      related:
        success_nodes:
          - identifier: Query Services
        organization:
          name: Default
          type: organization
        type: inventory
    - identifier: Query Services
      unified_job_template:
        - name: TEST CASC | Windows | Query Services
          organization:
            name: Default
            type: organization
          type: job_template

        


