---

controller_workflows:

- name: CASC | Windows | Workflow
  organization: Default
  allow_simultaneous: true
  labels: ['windows']
  simplified_workflow_nodes:

    # Root Node A: Project Sync
    - identifier: Sync Project
      all_parents_must_converge: false
      unified_job_template: "Test Repo New"
      success_nodes: 
        - Approve Workflow

    # Root Node B: Inventory Sync
    - identifier: Sync Inventory
      all_parents_must_converge: false
      unified_job_template: "Insights"
      success_nodes: 
        - Approve Workflow

    # Child Node: Converges after both syncs complete
    - identifier: Approve Workflow
      all_parents_must_converge: true
      approval_node:
        name: Simple approval node name
        description: Approve this to proceed in workflow
        timeout: 900
      success_nodes:
        - Run script

    - identifier: Run script
      unified_job_template: "TEST CASC | Windows | Query Services"
      always_nodes:
        - Second script
      failure_nodes:
        - Failure script
      success_nodes:
        - Success script

    - identifier: Second script
      unified_job_template: "TEST CASC | Windows | Query Services"

    - identifier: Failure script
      unified_job_template: "TEST CASC | Windows | Query Services"
    
    - identifier: Success script
      unified_job_template: "TEST CASC | Windows | Query Services"
