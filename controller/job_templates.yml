  - name: Linux | Install Applications
    description: "NOTE: This is managed by Config as Code. Manual changes may be overwritten."
    job_type: run
    organization: Default
    credentials:
      - Linux
    project: Test Repo New
    playbook: playbooks/linux/install_applications.yml
    execution_environment: Product Demos EE
    labels: ['linux']
    inventory: Home Lab (New)
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Server Name or Pattern
          type: text
          variable: _hosts
          default: web01.dperrone.dev
          required: true
        - question_name: Application to be installed
          type: multiplechoice
          variable: app_role
          default: apache
          required: true
          choices:
            - apache
            - kafka
            - nginx
            - opa
        - question_name: Apache Web Page Title
          type: text
          variable: apache_test_page_heading
          default: Apache Test Page
          required: false
        - question_name: Apache Web Page Body
          type: text
          variable: apache_test_page_message
          default: This is an Apache server running correctly in the Podman container!
          required: false
        - question_name: Kafka Topic
          type: text
          variable: demo_topic
          default: eda-test
          required: false

  - name: Linux | Install Packages
    description: "NOTE: This is managed by Config as Code. Manual changes may be overwritten."
    job_type: run
    organization: Default
    credentials:
      - Linux
    project: Test Repo New
