  # Linux Templates
  #############################

  - name: Linux | Fact Scan
    description: "NOTE: This is managed by Config as Code. Manual changes may be overwritten."
    job_type: run
    organization: Default
    credentials:
      - Linux
    project: Test Repo New
    playbook: playbooks/linux/fact_scan.yml
    execution_environment: Product Demos EE
    labels: ['linux']
    inventory: Home Lab (New)
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Server Name or Pattern
          type: text
          variable: _hosts
          default: os_linux
          required: true

  - name: Linux | DISA STIG
    description: "NOTE: This is managed by Config as Code. Manual changes may be overwritten."
    job_type: run
    organization: Default
    credentials:
      - Linux
    project: Ansible Product Demos
    playbook: linux/disa_stig.yml
    execution_environment: Product Demos EE
    labels: ['linux', 'security']
    inventory: Home Lab (New)
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Server Name or Pattern
          type: text
          variable: _hosts
          default: os_linux
