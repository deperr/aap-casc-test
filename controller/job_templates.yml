          type: text
          variable: _hosts
          default: web01.dperrone.dev
          required: true
        - question_name: Application to be installed
          type: multselect
          variable: selected_packages
          default: git
          required: true
          choices:
            - git
            - curl
            - wget
            - vim
            - htop
            - nano
            - unzip
            - jq

