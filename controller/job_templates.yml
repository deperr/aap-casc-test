          default: This is an incident created using AAP with the servicenow.itsm collection.
        - question_name: Incident Urgency
          variable: incident_urgency
          required: true
          type: multiplechoice
          choices:
            - high
            - medium
            - low
          default: medium
        - question_name: Incident Impact
          variable: incident_impact
          required: true
          type: multiplechoice
          choices:
            - high
            - medium
            - low
          default: medium
        - question_name: Incident State
          variable: incident_state
          required: true
          type: multiplechoice
          choices:
            - new
            - in_progress
            - on_hold
            - resolved
            - closed
