  #############################
  # ServiceNow Templates
  #############################

  - name: ServiceNow | Close Incident Ticket (new)
    description: "NOTE: This is managed by Config as Code. Manual changes may be overwritten."
    job_type: run
    organization: Default
    credentials:
      - ServiceNow (Dev)
    project: Test Repo New
    playbook: playbooks/itsm/snow_close_incident.yml
    execution_environment: ServiceNow EE (CaC)
    labels: ['itsm']
    inventory: Home Lab (New)
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Incident Number to Close
          variable: incident_number
          required: true
          type: text
        - question_name: Resolution Details
          variable: close_notes
          required: true
          type: textarea
        - question_name: Closure Reason
          variable: close_code
          required: true
          type: multiplechoice
          choices:
            - Solution provided
            - Solved (Permanently)
            - Solved (Work Around)
            - Not Solved (Not Reproducible)
            - Closed/Resolved by Caller
          default: Solution provided
        - question_name: Final State
          variable: closure_method
          required: true
          type: multiplechoice
          choices:
            - "6"
            - "7"
          default: "6"


  - name: ServiceNow | Create Change Request (CR) (new)
    description: "NOTE: This is managed by Config as Code. Manual changes may be overwritten."
    job_type: run
    organization: Default
    credentials:
      - ServiceNow (Dev)
    project: Test Repo New
    playbook: playbooks/itsm/snow_create_change_request.yml
    execution_environment: ServiceNow EE (CaC)
    labels: ['itsm']
    inventory: Home Lab (New)
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Enter Short Description
          variable: cr_short_description
          required: true
          type: text
          default: Change Request created via AAP workflow.
        - question_name: Describe the Change Request (CR)
          variable: cr_description
          required: true
          type: textarea
          default: This is a Change Request created using AAP with the servicenow.itsm collection.
        - question_name: Change Request Urgency
          variable: cr_urgency
          required: true
          type: multiplechoice
          choices:
            - high
            - medium
            - low
          default: medium
        - question_name: Change Request Impact
          variable: cr_impact
          required: true
          type: multiplechoice
          choices:
            - high
            - medium
            - low
          default: medium
        - question_name: Change Request State
          variable: incident_state
          required: true
          type: multiplechoice
          choices:
            - assess
            - authorize
            - scheduled
            - implement
            - review
            - closed
          default: assess
        - question_name: Create Change Request
          variable: create_change_request
          required: true
          type: multiplechoice
          choices:
            - "true"
            - "false"
          default: "true"

