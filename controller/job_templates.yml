  #############################
  # Windows Templates
  #############################

  - name: Windows | Query Services [CaSC]
    description: "Query services on Windows hosts with PowerShell Script. NOTE: Template is managed with CaSC"
    job_type: run
    organization: Default
    credentials:
      - Windows
    project: Test Repo New
    playbook: playbooks/windows/powershell.yml
    execution_environment: Product Demos EE
    labels: ['windows']
    inventory: Home Lab
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Server Name or Pattern
          type: text
          variable: _hosts
          default: dc01.dperrone.dev
          required: true
        - question_name: Service state to query
          type: multiplechoice
          variable: service_state
          default: Running
          choices:
            - Running
            - Stopped
          required: true

  - name: TEST CASC | Windows | Run PowerShell Script
    job_type: run
    organization: Default
    credentials:
      - Windows
    project: Test Repo New
    playbook: playbooks/windows/powershell_script.yml
    execution_environment: Product Demos EE
    labels: ['windows']
    inventory: Home Lab
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Server Name or Pattern
          type: text
          variable: _hosts
          default: os_windows
          required: true
        - question_name: PowerShell Script
          type: textarea
          variable: ps_script
          default: Get-Service | Where-Object -FilterScript {$_.Status -eq 'running'} | Select-Object -Property 'Name'
          required: true

  - name: TEST CASC | Windows | Active Directory User Management
    description: "Query services on Windows hosts with PowerShell Script. NOTE: Template is managed with CaSC"
    job_type: run
    organization: Default
    credentials:
      - Windows
    project: Test Repo New
    playbook: playbooks/windows/powershell_script.yml
    execution_environment: Product Demos EE
    labels: ['windows']
    inventory: Home Lab
    survey_enabled: true
    survey:
      name: ''
      description: ''
      spec:
        - question_name: Server Name or Pattern
          variable: _hosts
          required: true
          type: text
          default: dc01.dperrone.dev
        - question_name: User Management Action
          variable: user_management_action
          required: true
          type: multiplechoice
          choices:
            - Add
            - Remove
          default: Add
        - question_name: First Name
          variable: firstname
          required: true
          type: text
          default: Ansible
        - question_name: Last Name
          variable: surname
          required: true
          type: text
          default: TestUser
        - question_name: Company
          variable: company
          required: false
          type: text
          default: Test Company

